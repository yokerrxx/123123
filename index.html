<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>profile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="profile-container">
    <div class="profile-card">
        <div class="avatar-container">
            <img src="images.jpg" class="avatar" alt="Profile Picture">
        </div>
        
        <div class="profile-info">
            <h1 class="username">vanya123</h1>
            <div class="stats">
                <span class="stat-item"><strong>3</strong> публикаций</span>
                <span class="stat-item"><strong>10</strong> подписчиков</span>
                <span class="stat-item"><strong>1</strong> подписок</span>
            </div>
        </div>
    </div>

    <hr class="separator">

    <div class="posts-grid">
        <div class="post-item">
            <img src="post1.jpg" alt="Post 1">
        </div>
        <div class="post-item">
            <img src="post2.jpg" alt="Post 2">
        </div>
        <div class="post-item">
            <img src="post3.jpg" alt="Post 3">
        </div>
    </div>
</div>
</body>
</html>
